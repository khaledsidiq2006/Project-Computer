<html>

<head>
    <title>
        Login page
    </title>
    <style>
        body {
            background-image: url(Autumn.jpg);
            background-position: center;
            background-size: cover;

        }

        form {

            width: 350;
            background-color: rgb(111, 78, 61);
            border-radius: 10px;

        }

        .basic {
            display: block;
            margin: 5px;
            padding: 5px;

        }

        #submit {
            width: 200;
            display: block;
            background-color: rgb(142, 58, 2);
            margin-bottom: 10px;
        }

        .add {
            display: block;
        }

        input,
        label {
            margin: 5px;



        }
    </style>
</head>

<body>
    <center>

        <form action="Page 1.html">
            <h1>Register</h1>

            <label for name1 class="basic">Please Enter Your Name</label>
            <input type="text" name="name1">
            <label for mail class="basic">E-mail(if you don't mind that)</label>
            <input type="email" name="mail">
            <label for password class="basic">shshshshsh... your password</label>
            <input type="password" name="password">


            <label for gender class="add">hmmm... what's your gender</label><br>
            <label>Male</label><input type="radio" name="gender" value="Male">
            <label>Female</label><input type="radio" name="gender" value="Female">

            <label for fav_hobby class="add">What is your favourite hobby</label><br>
            <label>Writing</label><input type="checkbox" name="fav_hobby" value="Writing">
            <label>Reading</label><input type="checkbox" name="fav_hobby" value="Reading">
            <label>Coding</label><input type="checkbox" name="fav_hobby" value="Coding">
            <label>A sport</label> <input type="checkbox" name="fav_hobby" value="A sport">
            <label class="add">I've no permanent hobby</label><input type="checkbox" name="fav_hobby"
                value="I've no permanent hobby">
            <label for passion class="add">Do you feel that your time is wasted</label>
            <input type="radio" name="passion" value="A lot"><label>A lot</label>
            <input type="radio" name="passion" value="Yes"><label>Yes</label>
            <input type="radio" name="passion" value="nearly"><label>nearly</label>
            <input type="radio" name="passion" value="Not at all"><label>Not at all</label>
            <label for opinion class="add">Do you believe in self-helping books</label>
            <input type="radio" name="opinion" value="A lot"><label>A lot</label>
            <input type="radio" name="opinion" value="Yes"><label>Yes</label>
            <input type="radio" name="opinion" value="nearly"><label>nearly</label>
            <input type="radio" name="opinion" value="Not at all"><label>Not at all</label>
            <button type="submit" id="submit">DONE</button><br>





        </form>
    </center>
</body>

</html>
